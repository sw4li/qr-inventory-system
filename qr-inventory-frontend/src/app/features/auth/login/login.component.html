<div class="login-container">
  <div class="login-card">
    <h2>QR Inventory - Login</h2>

    <div class="error-message" *ngIf="error">
      {{ error }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="admin@example.com"
          class="form-control"
        />
        <div
          *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          <small *ngIf="loginForm.get('email')?.errors?.['required']">
            Email is required.
          </small>
          <small *ngIf="loginForm.get('email')?.errors?.['email']">
            Please enter a valid email address.
          </small>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="password123"
          class="form-control"
        />
        <div
          *ngIf="
            loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          <small *ngIf="loginForm.get('password')?.errors?.['required']">
            Password is required.
          </small>
          <small *ngIf="loginForm.get('password')?.errors?.['minLength'] < 6">
            Password should be atleat 6 characters.
          </small>
        </div>
      </div>

      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="loading || loginForm.invalid"
      >
        <span *ngIf="loading">Logging In</span
        ><span *ngIf="!loading">Log In</span>
      </button>
    </form>
  </div>
</div>
